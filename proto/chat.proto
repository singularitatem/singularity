syntax = "proto3";

package singularity.chat.v1;

option py_generic_services = true;

message Message {
  enum Role {
    ROLE_UNSPECIFIED = 0;
    ROLE_USER = 1;
    ROLE_ASSISTANT = 2;
    ROLE_SYSTEM = 3;
  }
  Role role = 1;
  string content = 2;
}

message ChatRequest {
  repeated Message messages = 1;
  string model = 2;
}

message ChatResponse {
  Message message = 1;
  string model = 2;
}

// Streamed over WebSocket; not a real gRPC stream in this stack.
message StreamChunk {
  string delta = 1;
  bool done = 2;
}

service ChatService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc StreamChat(ChatRequest) returns (stream StreamChunk);
}
